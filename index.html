<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradePilot AI — Live Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1f2937;
    --accent: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #f9fafb;
    --muted: #6b7280;
    --card: #161d2e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Pro Display', -apple-system, sans-serif; min-height: 100vh; }

  /* NAV */
  nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; color: var(--accent); }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #f59e0b, #ef4444); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .live-badge { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .live-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .last-update { color: var(--muted); font-size: 12px; }

  /* MAIN */
  main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  /* MARKET STRIP */
  .market-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .market-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; position: relative; overflow: hidden; }
  .market-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .market-card.up::before { background: var(--green); }
  .market-card.down::before { background: var(--red); }
  .market-card .name { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .market-card .price { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .market-card .change { font-size: 13px; font-weight: 600; }
  .market-card .change.up { color: var(--green); }
  .market-card .change.down { color: var(--red); }
  .market-card .ohlc { display: flex; gap: 12px; margin-top: 8px; font-size: 11px; color: var(--muted); }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media(max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  /* SECTIONS */
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .section-title .icon { font-size: 16px; }
  .refresh-btn { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: var(--accent); padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .refresh-btn:hover { background: rgba(245,158,11,0.2); }

  /* SIGNALS */
  .signal-item { border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; }
  .signal-badge { padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; min-width: 60px; text-align: center; }
  .signal-badge.BUY { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .signal-badge.SELL { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .signal-badge.NEUTRAL { background: rgba(107,114,128,0.15); color: var(--muted); border: 1px solid rgba(107,114,128,0.3); }
  .signal-info { flex: 1; }
  .signal-symbol { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
  .signal-details { font-size: 12px; color: var(--muted); }
  .signal-levels { text-align: right; font-size: 12px; }
  .signal-levels .entry { color: var(--accent); font-weight: 600; }
  .signal-levels .target { color: var(--green); }
  .signal-levels .sl { color: var(--red); }
  .confidence-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .confidence-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 2px; transition: width 0.5s; }

  /* NEWS */
  .news-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .news-item:last-child { border-bottom: none; }
  .news-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
  .news-title a { color: var(--text); text-decoration: none; }
  .news-title a:hover { color: var(--accent); }
  .news-meta { display: flex; gap: 12px; font-size: 11px; color: var(--muted); }
  .news-source { color: var(--accent); font-weight: 600; }

  /* SENTIMENT */
  .sentiment-box { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--surface); border-radius: 8px; margin-bottom: 12px; }
  .sentiment-icon { font-size: 24px; }
  .sentiment-label { font-size: 13px; color: var(--muted); }
  .sentiment-value { font-size: 16px; font-weight: 700; }
  .sentiment-value.BULLISH { color: var(--green); }
  .sentiment-value.BEARISH { color: var(--red); }
  .sentiment-value.NEUTRAL { color: var(--muted); }

  /* KEY LEVELS */
  .levels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .level-item { background: var(--surface); border-radius: 8px; padding: 10px 12px; }
  .level-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .level-value { font-size: 14px; font-weight: 700; }
  .level-value.support { color: var(--green); }
  .level-value.resistance { color: var(--red); }

  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--muted); gap: 10px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ERROR */
  .error-msg { color: var(--red); font-size: 13px; padding: 12px; background: rgba(239,68,68,0.1); border-radius: 8px; border: 1px solid rgba(239,68,68,0.2); }

  /* FOOTER */
  footer { text-align: center; padding: 20px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 20px; }
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-icon">📈</div>
    TradePilot AI
  </div>
  <div class="nav-right">
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    <div class="last-update" id="lastUpdate">Loading...</div>
  </div>
</nav>

<main>
  <!-- Market Strip -->
  <div class="market-strip" id="marketStrip">
    <div class="loading"><div class="spinner"></div> Loading market data...</div>
  </div>

  <!-- Signals + Sentiment -->
  <div class="grid-2">
    <!-- AI Signals -->
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span class="icon">🤖</span> AI Trading Signals</div>
        <button class="refresh-btn" onclick="loadSignals()">↻ Refresh</button>
      </div>
      <div id="signalsContainer">
        <div class="loading"><div class="spinner"></div> Loading signals...</div>
      </div>
    </div>

    <!-- Sentiment + Key Levels -->
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span class="icon">🎯</span> Market Sentiment & Levels</div>
      </div>
      <div id="sentimentContainer">
        <div class="loading"><div class="spinner"></div> Loading...</div>
      </div>
    </div>
  </div>

  <!-- News -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><span class="icon">📰</span> Live Market News</div>
      <button class="refresh-btn" onclick="loadNews()">↻ Refresh</button>
    </div>
    <div id="newsContainer">
      <div class="loading"><div class="spinner"></div> Loading news...</div>
    </div>
  </div>
</main>

<footer>TradePilot AI — Paper Trading Only. Not Investment Advice. Powered by Angel One + Claude AI</footer>

<script>
const SUPABASE_URL = 'https://wkiuvlqqfzehqxxzwisf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraXV2bHFxZnplaHF4eHp3aXNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMzk4NTAsImV4cCI6MjA5NTYxNTg1MH0.pmj-ZZX0SeblJVkghAedHwrQlrgC_ox8U1XM6-frSIQ';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

function fmt(n) { return parseFloat(n).toLocaleString('en-IN', { maximumFractionDigits: 2 }); }
function timeAgo(ts) {
  const diff = Math.floor((Date.now() - new Date(ts)) / 60000);
  if (diff < 1) return 'Just now';
  if (diff < 60) return `${diff}m ago`;
  return `${Math.floor(diff/60)}h ago`;
}

async function loadMarketData() {
  const strip = document.getElementById('marketStrip');
  try {
    const { data, error } = await db.from('market_data').select('*').order('updated_at', { ascending: false });
    if (error) throw error;
    if (!data || data.length === 0) { strip.innerHTML = '<div class="error-msg">No market data yet. n8n workflows activate કરો.</div>'; return; }

    document.getElementById('lastUpdate').textContent = 'Updated: ' + timeAgo(data[0].updated_at);

    strip.innerHTML = data.map(d => {
      const isUp = parseFloat(d.change_percent) >= 0;
      return `
        <div class="market-card ${isUp ? 'up' : 'down'}">
          <div class="name">${d.symbol}</div>
          <div class="price">₹${fmt(d.ltp)}</div>
          <div class="change ${isUp ? 'up' : 'down'}">${isUp ? '▲' : '▼'} ${Math.abs(d.change_percent)}%</div>
          <div class="ohlc">
            <span>O: ${fmt(d.open)}</span>
            <span>H: ${fmt(d.high)}</span>
            <span>L: ${fmt(d.low)}</span>
            <span>C: ${fmt(d.close)}</span>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    strip.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

async function loadSignals() {
  const container = document.getElementById('signalsContainer');
  const sentiment = document.getElementById('sentimentContainer');
  try {
    const { data, error } = await db.from('ai_signals').select('*').order('generated_at', { ascending: false }).limit(5);
    if (error) throw error;
    if (!data || data.length === 0) { container.innerHTML = '<div class="error-msg">No signals yet. AI workflow activate કરો.</div>'; return; }

    container.innerHTML = data.map(s => `
      <div class="signal-item">
        <div class="signal-badge ${s.signal}">${s.signal}</div>
        <div class="signal-info">
          <div class="signal-symbol">${s.symbol}</div>
          <div class="signal-details">${s.strength} • ${s.timeframe} • ${timeAgo(s.generated_at)}</div>
          <div class="signal-details" style="margin-top:4px;color:#9ca3af;">${s.reasoning || ''}</div>
          <div class="confidence-bar"><div class="confidence-fill" style="width:${s.confidence}%"></div></div>
        </div>
        <div class="signal-levels">
          <div class="entry">Entry: ₹${fmt(s.entry_price)}</div>
          <div class="target">Target: ₹${fmt(s.target_price)}</div>
          <div class="sl">SL: ₹${fmt(s.stop_loss)}</div>
          <div style="font-size:11px;color:#6b7280;margin-top:4px;">${s.confidence}% confidence</div>
        </div>
      </div>`).join('');

    // Sentiment from latest signal
    const latest = data[0];
    let levels = {};
    try { levels = JSON.parse(latest.key_levels || '{}'); } catch(e) {}

    sentiment.innerHTML = `
      <div class="sentiment-box">
        <div class="sentiment-icon">${latest.market_sentiment === 'BULLISH' ? '🟢' : latest.market_sentiment === 'BEARISH' ? '🔴' : '🟡'}</div>
        <div>
          <div class="sentiment-label">Market Sentiment</div>
          <div class="sentiment-value ${latest.market_sentiment}">${latest.market_sentiment}</div>
        </div>
      </div>
      <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:#9ca3af;">KEY LEVELS</div>
      <div class="levels-grid">
        <div class="level-item">
          <div class="level-label">NIFTY Support</div>
          <div class="level-value support">₹${fmt(levels.nifty_support || 0)}</div>
        </div>
        <div class="level-item">
          <div class="level-label">NIFTY Resistance</div>
          <div class="level-value resistance">₹${fmt(levels.nifty_resistance || 0)}</div>
        </div>
        <div class="level-item">
          <div class="level-label">BANKNIFTY Support</div>
          <div class="level-value support">₹${fmt(levels.banknifty_support || 0)}</div>
        </div>
        <div class="level-item">
          <div class="level-label">BANKNIFTY Resistance</div>
          <div class="level-value resistance">₹${fmt(levels.banknifty_resistance || 0)}</div>
        </div>
      </div>`;
  } catch(e) {
    container.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

async function loadNews() {
  const container = document.getElementById('newsContainer');
  try {
    const { data, error } = await db.from('market_news').select('*').order('published_at', { ascending: false }).limit(15);
    if (error) throw error;
    if (!data || data.length === 0) { container.innerHTML = '<div class="error-msg">No news yet. News workflow activate કરો.</div>'; return; }

    container.innerHTML = data.map(n => `
      <div class="news-item">
        <div class="news-title"><a href="${n.url}" target="_blank">${n.title}</a></div>
        <div class="news-meta">
          <span class="news-source">${n.source}</span>
          <span>${timeAgo(n.published_at)}</span>
        </div>
      </div>`).join('');
  } catch(e) {
    container.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

// Load all
async function loadAll() {
  await Promise.all([loadMarketData(), loadSignals(), loadNews()]);
}

loadAll();

// Auto refresh every 60 seconds
setInterval(loadAll, 60000);
</script>
</body>
</html>
